name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux builds - Elixir 1.18
          - os: ubuntu-latest
            elixir: "1.18"
            otp: "27.2"
          - os: ubuntu-latest
            elixir: "1.18"
            otp: "28.2"

          # Linux builds - Elixir 1.19
          - os: ubuntu-latest
            elixir: "1.19"
            otp: "27.2"
          # Latest pairing also runs the full lint gate
          - os: ubuntu-latest
            elixir: "1.19"
            otp: "28.2"
            lint: true

    steps:
      - uses: actions/checkout@v6

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Restore dependencies cache
        uses: actions/cache@v5
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ matrix.otp }}-${{ matrix.elixir }}-

      - name: Restore build cache
        uses: actions/cache@v5
        with:
          path: _build
          key: ${{ runner.os }}-build-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ matrix.otp }}-${{ matrix.elixir }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile --warnings-as-errors

      # Lint runs only on the latest Elixir/OTP pairing. These are the
      # non-mutating equivalents of the `mix precommit` steps so CI fails on
      # drift instead of silently fixing it.
      - name: Check for unused deps
        if: matrix.lint
        run: mix deps.unlock --check-unused

      - name: Check formatting
        if: matrix.lint
        run: mix format --check-formatted

      - name: Credo
        if: matrix.lint
        run: mix credo --strict

      - name: Run tests
        run: mix test

  coverage:
    name: Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18"
          otp-version: "27.2"

      - name: Restore dependencies cache
        uses: actions/cache@v5
        with:
          path: deps
          key: ${{ runner.os }}-mix-27.2-1.18-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-27.2-1.18-

      - name: Restore build cache
        uses: actions/cache@v5
        with:
          path: _build
          key: ${{ runner.os }}-build-27.2-1.18-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-build-27.2-1.18-

      - name: Install dependencies
        run: mix deps.get

      - name: Run coverage
        run: mix coveralls.github
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
